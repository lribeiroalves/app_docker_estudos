services:
  web:
    build: .
    container_name: flask_app
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "5000:5000"

    # Perfil de desenvolvimento
    profiles: ["dev"]
    command: python wsgi.py
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1

  web-prod:
    build: .
    container_name: flask_app_prod
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "5000:5000"

    # Perfil de produção
    profiles: ["prod"]
    command: gunicorn -w 4 -b 0.0.0.0:5000 wsgi:app
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0